<div class="text-center">
  <h2 class="text-3xl font-semibold">
    {{ title }}
  </h2>
</div>

<div class="mt-8 flex justify-center">
  <div
    class="inline-flex rounded-md border border-gray-300 overflow-hidden bg-white"
  >
    @for (tab of tabs; track tab.id) {
      <button
        type="button"
        class="min-w-36 px-5 py-2.5 text-sm transition-colors duration-200"
        [class.bg-brand-500]="isTabActive(tab.id)"
        [class.text-white]="isTabActive(tab.id)"
        [class.text-gray-600]="!isTabActive(tab.id)"
        [class.hover:bg-gray-50]="!isTabActive(tab.id)"
        [class.border-r]="tab.id === 'system'"
        [class.border-gray-300]="tab.id === 'system'"
        (click)="setTab(tab.id)"
      >
        {{ tab.label }}
      </button>
    }
  </div>
</div>

<div class="mt-14 space-y-14">
  @for (item of works; track item.title; let i = $index) {
    <div class="grid grid-cols-1 md:grid-cols-2 gap-10 items-center">
      <!-- 圖：偶數在左、奇數在右 -->
      <div [class.md:order-2]="i % 2 === 1" class="order-1">
        <div
          class="bg-gray-50 border border-gray-100 shadow-soft overflow-hidden"
        >
          <img
            [src]="item.image"
            [alt]="item.title"
            class="w-full h-auto object-cover"
          />
        </div>
      </div>

      <div [class.md:order-1]="i % 2 === 1" class="order-2">
        <h3 class="text-xl font-semibold">{{ item.title }}</h3>
        <p class="mt-2 text-gray-500 text-sm">{{ item.subtitle }}</p>

        <ul class="mt-5 space-y-2 text-gray-700">
          @for (b of item.bullets; track b; let j = $index) {
            <li class="flex gap-2">
              <span
                class="mt-2 block h-1.5 w-1.5 shrink-0 rounded-full bg-brand-500"
              ></span>
              <span class="text-sm leading-6 text-gray-600">{{ b }}</span>
            </li>
          }
        </ul>

        <p class="mt-5 text-sm text-gray-600">
          <span class="font-medium text-gray-800">{{ stackLabel }}</span>
          {{ item.stack }}
        </p>
      </div>
    </div>
  }
</div>
