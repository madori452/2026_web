<div class="">
  <app-site-header></app-site-header>

  <app-cover [lang]="lang"></app-cover>

  <section id="experience" class="py-20 px-6 md:px-0">
    <div class="">
      <app-experience [lang]="lang"></app-experience>
    </div>
  </section>

  <section id="skills" class="py-24 bg-gray-50">
    <div class="mx-auto w-full max-w-6xl px-6 p">
      <app-skills [lang]="lang"></app-skills>
    </div>
  </section>

  <section id="works" class="py-24">
    <div class="mx-auto w-full max-w-6xl px-6">
      <app-works [lang]="lang"></app-works>
    </div>
  </section>

  <section id="future" class="py-40 bg-[url('./assets/bg/future.png')]">
    <app-future [lang]="lang"></app-future>
  </section>

  <button
    type="button"
    class="back-to-top"
    [class.back-to-top--visible]="showBackToTop"
    [attr.aria-hidden]="!showBackToTop"
    (click)="scrollToTop()"
    aria-label="Back to top"
  >
    ↑
  </button>

  <app-site-footer [lang]="lang"></app-site-footer>
</div>
